name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 120s
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 1: GARANTIR BANCO FORA DO REPOSITORIO GIT     ║
            # ║   O banco vive em ~/etecsam_data, longe de qualquer     ║
            # ║   git reset/clean que rode dentro da pasta do projeto   ║
            # ╚══════════════════════════════════════════════════════════╝
            DATA_DIR=~/etecsam_data
            BACKUP_DIR=~/db_backups
            mkdir -p "$DATA_DIR" "$BACKUP_DIR"
            EXTERNAL_DB="$DATA_DIR/database.sqlite"
            IN_REPO_DB="database/database.sqlite"
            LATEST_FILE="$BACKUP_DIR/latest.sqlite"

            # Migracao automatica (so roda na primeira vez, depois EXTERNAL_DB ja existe)
            if [ ! -f "$EXTERNAL_DB" ] || [ ! -s "$EXTERNAL_DB" ]; then
              if [ -f "$IN_REPO_DB" ] && [ -s "$IN_REPO_DB" ]; then
                cp "$IN_REPO_DB" "$EXTERNAL_DB"
                echo "✓ Banco migrado de dentro do repo para $EXTERNAL_DB"
              elif [ -f "$LATEST_FILE" ] && [ -s "$LATEST_FILE" ]; then
                cp "$LATEST_FILE" "$EXTERNAL_DB"
                echo "✓ Banco ausente no repo - restaurado do ultimo backup para $EXTERNAL_DB"
              else
                touch "$EXTERNAL_DB"
                echo "⚠ Nenhuma fonte de dados disponivel - banco criado vazio (primeira instalacao)"
              fi
            fi
            chmod 664 "$EXTERNAL_DB" 2>/dev/null || true

            # Garante que o .env do servidor aponta para o banco externo
            if [ -f .env ]; then
              if grep -q "^DB_DATABASE=" .env; then
                sed -i "s|^DB_DATABASE=.*|DB_DATABASE=$EXTERNAL_DB|" .env
              else
                echo "DB_DATABASE=$EXTERNAL_DB" >> .env
              fi
              if ! grep -q "^DB_CONNECTION=sqlite" .env; then
                if grep -q "^DB_CONNECTION=" .env; then
                  sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
                else
                  echo "DB_CONNECTION=sqlite" >> .env
                fi
              fi
              echo "✓ .env apontando para $EXTERNAL_DB"
            else
              echo "⚠ .env nao encontrado - verifique manualmente a configuracao do banco"
            fi

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 2: BACKUP DO BANCO (FORA DO REPO, SEMPRE)     ║
            # ╚══════════════════════════════════════════════════════════╝
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

            if [ -f "$EXTERNAL_DB" ] && [ -s "$EXTERNAL_DB" ]; then
              cp "$EXTERNAL_DB" "$BACKUP_DIR/database_$TIMESTAMP.sqlite"
              cp "$EXTERNAL_DB" "$LATEST_FILE"
              # Copia visivel e nomeada do banco anterior, fora do repo tambem
              cp "$EXTERNAL_DB" "$DATA_DIR/old-data-modificacao-database.sqlite"
              DB_SIZE=$(stat -c%s "$EXTERNAL_DB")
              echo "✓ Backup criado: database_$TIMESTAMP.sqlite ($DB_SIZE bytes)"
            else
              echo "⚠ Banco nao encontrado ou vazio - sem backup desta vez"
            fi

            # Manter apenas os ultimos 10 backups
            BACKUP_COUNT=$(ls "$BACKUP_DIR"/database_*.sqlite 2>/dev/null | wc -l)
            if [ "$BACKUP_COUNT" -gt 10 ]; then
              ls -t "$BACKUP_DIR"/database_*.sqlite | tail -n +11 | xargs rm -f
              echo "✓ Backups antigos removidos (mantendo os 10 mais recentes)"
            fi

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 3: ATUALIZAR CODIGO DO GITHUB                 ║
            # ║   Banco fica fora da pasta - reset --hard nao o toca    ║
            # ╚══════════════════════════════════════════════════════════╝
            git fetch origin main
            git reset --hard origin/main
            echo "✓ Codigo atualizado do GitHub"

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 4: DEPENDENCIAS E MIGRATIONS                  ║
            # ╚══════════════════════════════════════════════════════════╝
            composer install --no-dev --optimize-autoloader --no-interaction
            echo "✓ Composer instalado"

            # Migrations com flag safe (nao apaga dados existentes)
            php artisan migrate --force
            echo "✓ Migrations executadas"

            # Garantir usuario admin (updateOrInsert - nao sobrescreve dados)
            php artisan db:seed --class=AdminSeeder --force
            echo "✓ AdminSeeder executado"

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 5: CACHE E STORAGE                            ║
            # ╚══════════════════════════════════════════════════════════╝
            php artisan config:clear && php artisan route:clear && php artisan view:clear
            php artisan config:cache && php artisan route:cache
            echo "✓ Cache limpo e recriado"

            # Sincronizar storage/app/public -> public/storage
            # (Hostinger normalmente nao suporta symlink, por isso copiamos os arquivos)
            mkdir -p public/storage
            if [ -d "storage/app/public" ]; then
              cp -rf storage/app/public/. public/storage/
              echo "✓ Storage sincronizado (storage/app/public -> public/storage)"
            else
              echo "⚠ storage/app/public nao existe ainda - nada para sincronizar"
            fi

            echo "--- DIAG: testando suporte a symlink no Hostinger ---"
            rm -rf /tmp/symlink_test_target /tmp/symlink_test_link
            mkdir -p /tmp/symlink_test_target
            echo "conteudo-teste" > /tmp/symlink_test_target/arquivo.txt
            if ln -s /tmp/symlink_test_target /tmp/symlink_test_link 2>/tmp/symlink_test_err; then
              if [ "$(cat /tmp/symlink_test_link/arquivo.txt 2>&1)" = "conteudo-teste" ]; then
                echo "✓ Symlink FUNCIONA neste servidor"
              else
                echo "⚠ ln -s nao deu erro mas a leitura pelo link falhou"
              fi
            else
              echo "✗ Symlink NAO suportado: $(cat /tmp/symlink_test_err)"
            fi
            rm -rf /tmp/symlink_test_target /tmp/symlink_test_link /tmp/symlink_test_err

            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║              DEPLOY CONCLUIDO COM SUCESSO!             ║"
            echo "║  Banco preservado: $(stat -c%s "$EXTERNAL_DB" 2>/dev/null || echo '?') bytes  ║"
            echo "║  Local: $EXTERNAL_DB  ║"
            echo "║  Backups disponiveis: $(ls $BACKUP_DIR/database_*.sqlite 2>/dev/null | wc -l)  ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            exit 0
