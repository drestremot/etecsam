name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 120s
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 1: BACKUP OBRIGATORIO DO BANCO DE DADOS       ║
            # ║   Executado SEMPRE, antes de qualquer outra operacao    ║
            # ╚══════════════════════════════════════════════════════════╝
            BACKUP_DIR=~/db_backups
            mkdir -p "$BACKUP_DIR"

            DB_FILE="database/database.sqlite"
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            BACKUP_FILE="$BACKUP_DIR/database_$TIMESTAMP.sqlite"
            LATEST_FILE="$BACKUP_DIR/latest.sqlite"

            if [ -f "$DB_FILE" ] && [ -s "$DB_FILE" ]; then
              cp "$DB_FILE" "$BACKUP_FILE"
              cp "$DB_FILE" "$LATEST_FILE"
              DB_SIZE=$(stat -c%s "$DB_FILE")
              echo "✓ Backup criado: database_$TIMESTAMP.sqlite ($DB_SIZE bytes)"
            else
              echo "⚠ Banco nao encontrado ou vazio - sem backup desta vez"
            fi

            # Manter apenas os ultimos 10 backups
            BACKUP_COUNT=$(ls "$BACKUP_DIR"/database_*.sqlite 2>/dev/null | wc -l)
            if [ "$BACKUP_COUNT" -gt 10 ]; then
              ls -t "$BACKUP_DIR"/database_*.sqlite | tail -n +11 | xargs rm -f
              echo "✓ Backups antigos removidos (mantendo os 10 mais recentes)"
            fi

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 2: REMOVER BANCO DO RASTREAMENTO GIT          ║
            # ║   Garante que git reset nao apague o banco              ║
            # ╚══════════════════════════════════════════════════════════╝
            git rm --cached "$DB_FILE" 2>/dev/null || true
            git rm --cached "$DB_FILE-wal" 2>/dev/null || true
            git rm --cached "$DB_FILE-shm" 2>/dev/null || true
            echo "✓ Banco removido do rastreamento Git"

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 3: SALVAR BANCO EM LOCAL TEMPORARIO           ║
            # ║   Proteção extra antes do git reset                     ║
            # ╚══════════════════════════════════════════════════════════╝
            TEMP_DB="/tmp/etecsam_db_backup_$TIMESTAMP.sqlite"
            if [ -f "$DB_FILE" ] && [ -s "$DB_FILE" ]; then
              cp "$DB_FILE" "$TEMP_DB"
              echo "✓ Copia temporaria salva em $TEMP_DB"
            fi

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 4: ATUALIZAR CODIGO DO GITHUB                 ║
            # ╚══════════════════════════════════════════════════════════╝
            git fetch origin main
            git reset --hard origin/main
            echo "✓ Codigo atualizado do GitHub"

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 5: RESTAURAR BANCO (SEMPRE)                   ║
            # ║   O banco NUNCA deve ser sobrescrito pelo deploy        ║
            # ╚══════════════════════════════════════════════════════════╝

            # Tentar restaurar do backup temporario primeiro (mais recente)
            if [ -f "$TEMP_DB" ] && [ -s "$TEMP_DB" ]; then
              cp "$TEMP_DB" "$DB_FILE"
              chmod 664 "$DB_FILE"
              rm -f "$TEMP_DB"
              RESTORED_SIZE=$(stat -c%s "$DB_FILE")
              echo "✓ Banco restaurado do backup temporario ($RESTORED_SIZE bytes)"

            # Se nao tem temporario, usar o latest do diretorio de backups
            elif [ -f "$LATEST_FILE" ] && [ -s "$LATEST_FILE" ]; then
              cp "$LATEST_FILE" "$DB_FILE"
              chmod 664 "$DB_FILE"
              RESTORED_SIZE=$(stat -c%s "$DB_FILE")
              echo "✓ Banco restaurado do latest.sqlite ($RESTORED_SIZE bytes)"

            # Se nao tem backup, criar banco vazio (primeira vez)
            else
              touch "$DB_FILE"
              chmod 664 "$DB_FILE"
              echo "⚠ Nenhum backup disponivel - banco criado vazio (primeira instalacao)"
            fi

            # Garantir que o banco nao sera rastreado pelo git agora
            echo "database/database.sqlite" >> .git/info/exclude 2>/dev/null || true

            echo "--- DIAG[1] pos-restore ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 6: DEPENDENCIAS E MIGRATIONS                  ║
            # ╚══════════════════════════════════════════════════════════╝
            composer install --no-dev --optimize-autoloader --no-interaction
            echo "✓ Composer instalado"
            echo "--- DIAG[2] pos-composer ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1

            # Migrations com flag safe (nao apaga dados existentes)
            php artisan migrate --force
            echo "✓ Migrations executadas"
            echo "--- DIAG[3] pos-migrate ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1

            # Garantir usuario admin (updateOrInsert - nao sobrescreve dados)
            php artisan db:seed --class=AdminSeeder --force
            echo "✓ AdminSeeder executado"
            echo "--- DIAG[4] pos-seed ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1

            # ╔══════════════════════════════════════════════════════════╗
            # ║     PASSO 7: CACHE E STORAGE                            ║
            # ╚══════════════════════════════════════════════════════════╝
            php artisan config:clear
            echo "--- DIAG[5a] pos-config:clear ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1
            php artisan route:clear
            echo "--- DIAG[5b] pos-route:clear ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1
            echo "--- DIAG[view.compiled antes do view:clear] ---"
            php artisan tinker --execute="echo 'view.compiled='.var_export(config('view.compiled'), true).PHP_EOL; echo 'dir-existe='.(is_dir(storage_path('framework/views')) ? 'sim' : 'NAO').PHP_EOL;" 2>&1
            php artisan view:clear
            echo "--- DIAG[5c] pos-view:clear ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1
            php artisan config:cache && php artisan route:cache
            echo "--- DIAG[6] pos-config:cache/route:cache ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1
            echo "✓ Cache limpo e recriado"

            # Sincronizar storage/app/public -> public/storage
            # (Hostinger normalmente nao suporta symlink, por isso copiamos os arquivos)
            mkdir -p public/storage
            if [ -d "storage/app/public" ]; then
              cp -rf storage/app/public/. public/storage/
              echo "✓ Storage sincronizado (storage/app/public -> public/storage)"
            else
              echo "⚠ storage/app/public nao existe ainda - nada para sincronizar"
            fi
            echo "--- DIAG[7] pos-storage-sync ---"; stat -c "%n %s bytes %a" "$DB_FILE" 2>&1

            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║              DEPLOY CONCLUIDO COM SUCESSO!             ║"
            echo "║  Banco preservado: $(stat -c%s "$DB_FILE" 2>/dev/null || echo '?') bytes  ║"
            echo "║  Backups disponiveis: $(ls $BACKUP_DIR/database_*.sqlite 2>/dev/null | wc -l)  ║"
            echo "╚══════════════════════════════════════════════════════════╝"

            echo "--- DIAG[8] espera 5s e rechecka ---"
            sleep 5
            stat -c "%n %s bytes %a" "$DB_FILE" 2>&1
            echo "--- DIAG[9] quota de disco ---"
            df -h . 2>&1 | head -5
            du -sh ~ 2>&1
            echo "--- DIAG[10] procurando database.sqlite em todo o home (possivel quarentena) ---"
            find ~ -iname "database.sqlite*" 2>/dev/null
