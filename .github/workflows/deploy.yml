name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 120s
          script_stop: false
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam

            # === PROTECAO DO BANCO DE DADOS ===
            # Remover banco do rastreamento Git sem apagar o arquivo
            git rm --cached database/database.sqlite 2>/dev/null || true
            git rm --cached database/database.sqlite-wal 2>/dev/null || true
            git rm --cached database/database.sqlite-shm 2>/dev/null || true

            # Backup do banco antes de qualquer operacao
            if [ -f database/database.sqlite ]; then
              cp database/database.sqlite database/database.sqlite.bak
              echo "Backup do banco criado: database.sqlite.bak"
            fi

            # Atualizar o codigo
            git fetch origin main
            git reset --hard origin/main

            # Restaurar banco se o reset o sobrescreveu
            if [ -f database/database.sqlite.bak ]; then
              BACKUP_SIZE=$(stat -c%s database/database.sqlite.bak)
              CURRENT_SIZE=$(stat -c%s database/database.sqlite 2>/dev/null || echo "0")
              if [ "$CURRENT_SIZE" -lt "$BACKUP_SIZE" ]; then
                cp database/database.sqlite.bak database/database.sqlite
                echo "Banco restaurado do backup"
              fi
            fi

            # Garantir que o arquivo SQLite existe (Laravel 12 nao cria automaticamente)
            touch database/database.sqlite
            chmod 664 database/database.sqlite
            # === FIM PROTECAO ===

            # Instalar dependencias PHP
            composer install --no-dev --optimize-autoloader --no-interaction

            # Rodar apenas migrations pendentes (nunca apaga dados existentes)
            php artisan migrate --force

            # Seed inicial: so executa se o banco estiver vazio (primeira instalacao)
            USER_COUNT=$(php -r "
              try {
                \$db = new PDO('sqlite:database/database.sqlite');
                echo \$db->query('SELECT COUNT(*) FROM users')->fetchColumn();
              } catch(Exception \$e) { echo 0; }
            " 2>/dev/null || echo 0)
            if [ "\$USER_COUNT" = "0" ]; then
              echo "Banco vazio - executando seed inicial..."
              php artisan db:seed --class=AdminSeeder --force
              php artisan db:seed --class=ThemeSeeder --force
            else
              echo "Banco com dados (${USER_COUNT} usuarios) - seed ignorado"
            fi

            # Limpar e recriar caches
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache

            # Garantir que os diretorios do storage existem
            mkdir -p storage/framework/views
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/cache/data
            mkdir -p storage/logs

            # Corrigir permissoes de escrita
            chmod -R 775 storage/
            chmod -R 775 bootstrap/cache/
            chmod 664 database/database.sqlite 2>/dev/null || true

            # Criar/recriar symlink do storage
            rm -f public/storage
            ln -s ~/domains/etecsam.com.br/public_html/etecsam/storage/app/public public/storage
            echo "Storage symlink: $(readlink -f public/storage)"

            echo "=== DIAGNOSTICO ==="
            php --version
            echo "APP_KEY definida: $(grep -q 'APP_KEY=base64' .env 2>/dev/null && echo SIM || echo NAO)"
            echo ".env existe: $([ -f .env ] && echo SIM || echo NAO)"
            echo "APP_ENV: $(grep 'APP_ENV=' .env 2>/dev/null | head -1)"
            echo "APP_DEBUG: $(grep 'APP_DEBUG=' .env 2>/dev/null | head -1)"
            echo "SQLite existe: $([ -f database/database.sqlite ] && echo SIM || echo NAO)"
            echo "SQLite tamanho: $(stat -c%s database/database.sqlite 2>/dev/null || echo 0) bytes"
            echo "storage/framework/views: $([ -d storage/framework/views ] && echo OK || echo FALTA)"
            echo "storage/framework/sessions: $([ -d storage/framework/sessions ] && echo OK || echo FALTA)"
            php -r "echo 'pdo_sqlite: ' . (extension_loaded('pdo_sqlite') ? 'OK' : 'FALTA') . PHP_EOL;"
            echo "PHP error_log:"
            cat ~/logs/php_error.log 2>/dev/null | tail -10 \
              || cat ~/public_html/error_log 2>/dev/null | tail -10 \
              || cat ~/domains/etecsam.com.br/public_html/error_log 2>/dev/null | tail -10 \
              || echo "(log PHP nao encontrado)"

            echo "=== ERROS no laravel.log ==="
            grep -a "\.ERROR\|\.CRITICAL\|\.EMERGENCY" storage/logs/laravel.log 2>/dev/null | tail -5 || echo "(sem erros no log)"

            echo "=== Deploy concluido ==="
