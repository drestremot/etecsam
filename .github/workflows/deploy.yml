name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 120s
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam

            # в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
            # в•‘     PASSO 1: GARANTIR BANCO FORA DO REPOSITORIO GIT     в•‘
            # в•‘   O banco vive em ~/etecsam_data, longe de qualquer     в•‘
            # в•‘   git reset/clean que rode dentro da pasta do projeto   в•‘
            # в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
            DATA_DIR=~/etecsam_data
            BACKUP_DIR=~/db_backups
            mkdir -p "$DATA_DIR" "$BACKUP_DIR"
            EXTERNAL_DB="$DATA_DIR/database.sqlite"
            IN_REPO_DB="database/database.sqlite"
            LATEST_FILE="$BACKUP_DIR/latest.sqlite"

            # Migracao automatica (so roda na primeira vez, depois EXTERNAL_DB ja existe)
            if [ ! -f "$EXTERNAL_DB" ] || [ ! -s "$EXTERNAL_DB" ]; then
              if [ -f "$IN_REPO_DB" ] && [ -s "$IN_REPO_DB" ]; then
                cp "$IN_REPO_DB" "$EXTERNAL_DB"
                echo "вњ“ Banco migrado de dentro do repo para $EXTERNAL_DB"
              elif [ -f "$LATEST_FILE" ] && [ -s "$LATEST_FILE" ]; then
                cp "$LATEST_FILE" "$EXTERNAL_DB"
                echo "вњ“ Banco ausente no repo - restaurado do ultimo backup para $EXTERNAL_DB"
              else
                touch "$EXTERNAL_DB"
                echo "вљ  Nenhuma fonte de dados disponivel - banco criado vazio (primeira instalacao)"
              fi
            fi
            chmod 664 "$EXTERNAL_DB" 2>/dev/null || true

            # Garante que o .env do servidor aponta para o banco externo
            if [ -f .env ]; then
              if grep -q "^DB_DATABASE=" .env; then
                sed -i "s|^DB_DATABASE=.*|DB_DATABASE=$EXTERNAL_DB|" .env
              else
                echo "DB_DATABASE=$EXTERNAL_DB" >> .env
              fi
              if ! grep -q "^DB_CONNECTION=sqlite" .env; then
                if grep -q "^DB_CONNECTION=" .env; then
                  sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=sqlite|" .env
                else
                  echo "DB_CONNECTION=sqlite" >> .env
                fi
              fi
              echo "вњ“ .env apontando para $EXTERNAL_DB"

              # Garante locale pt_BR (datas em portugues - Carbon::setLocale le isso)
              if grep -q "^APP_LOCALE=" .env; then
                sed -i "s|^APP_LOCALE=.*|APP_LOCALE=pt_BR|" .env
              else
                echo "APP_LOCALE=pt_BR" >> .env
              fi
              echo "вњ“ APP_LOCALE=pt_BR garantido no .env"
            else
              echo "вљ  .env nao encontrado - verifique manualmente a configuracao do banco"
            fi

            # в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
            # в•‘     PASSO 2: BACKUP DO BANCO (FORA DO REPO, SEMPRE)     в•‘
            # в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

            if [ -f "$EXTERNAL_DB" ] && [ -s "$EXTERNAL_DB" ]; then
              cp "$EXTERNAL_DB" "$BACKUP_DIR/database_$TIMESTAMP.sqlite"
              cp "$EXTERNAL_DB" "$LATEST_FILE"
              # Copia visivel e nomeada do banco anterior, fora do repo tambem
              cp "$EXTERNAL_DB" "$DATA_DIR/old-data-modificacao-database.sqlite"
              DB_SIZE=$(stat -c%s "$EXTERNAL_DB")
              echo "вњ“ Backup criado: database_$TIMESTAMP.sqlite ($DB_SIZE bytes)"
            else
              echo "вљ  Banco nao encontrado ou vazio - sem backup desta vez"
            fi

            # Manter apenas os ultimos 10 backups
            BACKUP_COUNT=$(ls "$BACKUP_DIR"/database_*.sqlite 2>/dev/null | wc -l)
            if [ "$BACKUP_COUNT" -gt 10 ]; then
              ls -t "$BACKUP_DIR"/database_*.sqlite | tail -n +11 | xargs rm -f
              echo "вњ“ Backups antigos removidos (mantendo os 10 mais recentes)"
            fi

            # в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
            # в•‘     PASSO 2.5: BACKUP DAS FOTOS (FORA DO REPO, SEMPRE)  в•‘
            # в•‘   public/storage e' gitignored - reset --hard nunca o  в•‘
            # в•‘   toca, mas mantemos um backup extra por seguranca.    в•‘
            # в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
            PHOTOS_BACKUP_DIR=~/photos_backups
            mkdir -p "$PHOTOS_BACKUP_DIR"
            if [ -d "public/storage" ]; then
              PHOTO_COUNT=$(find public/storage -type f | wc -l)
              if [ "$PHOTO_COUNT" -gt 0 ]; then
                tar -czf "$PHOTOS_BACKUP_DIR/storage_$TIMESTAMP.tar.gz" -C public storage
                echo "вњ“ Backup das fotos criado: storage_$TIMESTAMP.tar.gz ($PHOTO_COUNT arquivos)"
              else
                echo "вљ  public/storage sem arquivos - sem backup de fotos desta vez"
              fi
            else
              echo "вљ  public/storage nao existe ainda - sem backup de fotos desta vez"
            fi
            # Manter apenas os ultimos 5 backups de fotos (arquivo pode ser pesado)
            ls -t "$PHOTOS_BACKUP_DIR"/storage_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f

            # в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
            # в•‘     PASSO 3: ATUALIZAR CODIGO DO GITHUB                 в•‘
            # в•‘   Banco fica fora da pasta - reset --hard nao o toca    в•‘
            # в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
            git fetch origin main
            git reset --hard origin/main
            echo "вњ“ Codigo atualizado do GitHub"

            # в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
            # в•‘     PASSO 4: DEPENDENCIAS E MIGRATIONS                  в•‘
            # в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
            composer install --no-dev --optimize-autoloader --no-interaction
            echo "вњ“ Composer instalado"

            # Migrations com flag safe (nao apaga dados existentes)
            php artisan migrate --force
            echo "вњ“ Migrations executadas"

            # Garantir usuario admin (updateOrInsert - nao sobrescreve dados)
            php artisan db:seed --class=AdminSeeder --force
            echo "вњ“ AdminSeeder executado"

            # в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—
            # в•‘     PASSO 5: CACHE E STORAGE                            в•‘
            # в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ
            php artisan config:clear && php artisan route:clear && php artisan view:clear
            php artisan config:cache && php artisan route:cache
            echo "вњ“ Cache limpo e recriado"

            # Sincronizar storage/app/public -> public/storage
            # (Hostinger normalmente nao suporta symlink, por isso copiamos os arquivos)
            # Se public/storage for um symlink (de uma tentativa antiga de storage:link),
            # removemos o link primeiro - cp escrevendo atraves de um symlink quebrado
            # falha silenciosamente e os arquivos nunca chegam onde o site os serve.
            if [ -L "public/storage" ]; then
              echo "вљ  public/storage e um symlink - removendo para usar diretorio real"
              rm -f public/storage
            fi
            mkdir -p public/storage

            if [ -d "storage/app/public" ]; then
              cp -rf storage/app/public/. public/storage/
              SRC_COUNT=$(find storage/app/public -type f | wc -l)
              DST_COUNT=$(find public/storage -type f | wc -l)
              if [ "$DST_COUNT" -ge "$SRC_COUNT" ]; then
                echo "вњ“ Storage sincronizado: $DST_COUNT arquivos em public/storage (fonte: $SRC_COUNT)"
              else
                echo "вњ— FALHA ao sincronizar storage! fonte=$SRC_COUNT arquivos, destino=$DST_COUNT arquivos"
              fi
            else
              echo "вљ  storage/app/public nao existe ainda - nada para sincronizar"
            fi

            echo "--- DIAG: permissoes e escrita real no disco 'public' ---"
            ls -la public/ | grep storage
            ls -la public/storage | head -5
            stat -c '%U:%G %a' public/storage 2>/dev/null || echo "stat falhou"
            df -h . 2>/dev/null | tail -2
            php artisan tinker --execute="
                try {
                    \$ok = \Illuminate\Support\Facades\Storage::disk('public')->put('diag-write-test.txt', 'teste-'.time());
                    echo 'put() retornou: '.var_export(\$ok, true).PHP_EOL;
                    \$exists = \Illuminate\Support\Facades\Storage::disk('public')->exists('diag-write-test.txt');
                    echo 'arquivo existe apos put(): '.var_export(\$exists, true).PHP_EOL;
                    echo 'disco public root: '.\Illuminate\Support\Facades\Storage::disk('public')->path('').PHP_EOL;
                } catch (\Throwable \$e) {
                    echo 'EXCEPTION: '.\$e->getMessage().PHP_EOL;
                }
            "
            ls -la public/storage/diag-write-test.txt 2>&1
            tail -20 storage/logs/laravel.log 2>/dev/null || echo "sem laravel.log"

            echo "--- DIAG: testando suporte a symlink no Hostinger ---"
            rm -rf /tmp/symlink_test_target /tmp/symlink_test_link
            mkdir -p /tmp/symlink_test_target
            echo "conteudo-teste" > /tmp/symlink_test_target/arquivo.txt
            if ln -s /tmp/symlink_test_target /tmp/symlink_test_link 2>/tmp/symlink_test_err; then
              if [ "$(cat /tmp/symlink_test_link/arquivo.txt 2>&1)" = "conteudo-teste" ]; then
                echo "вњ“ Symlink FUNCIONA neste servidor"
              else
                echo "вљ  ln -s nao deu erro mas a leitura pelo link falhou"
              fi
            else
              echo "вњ— Symlink NAO suportado: $(cat /tmp/symlink_test_err)"
            fi
            rm -rf /tmp/symlink_test_target /tmp/symlink_test_link /tmp/symlink_test_err

            echo ""
            echo "в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—"
            echo "в•‘              DEPLOY CONCLUIDO COM SUCESSO!             в•‘"
            echo "в•‘  Banco preservado: $(stat -c%s "$EXTERNAL_DB" 2>/dev/null || echo '?') bytes  в•‘"
            echo "в•‘  Local: $EXTERNAL_DB  в•‘"
            echo "в•‘  Backups disponiveis: $(ls $BACKUP_DIR/database_*.sqlite 2>/dev/null | wc -l)  в•‘"
            echo "в•‘  Backups de fotos: $(ls $PHOTOS_BACKUP_DIR/storage_*.tar.gz 2>/dev/null | wc -l)  в•‘"
            echo "в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ"
            exit 0
