name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias JS
        run: npm ci

      - name: Build dos assets (Vite)
        run: npm run build

      - name: Commitar build no repositorio
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/build/
          git diff --staged --quiet && echo "Sem mudancas no build" || (git commit -m "ci: atualiza public/build [skip ci]" && git push origin main)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 120s
          script_stop: false
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan db:seed --class=AdminSeeder --force
            php artisan config:clear && php artisan route:clear && php artisan view:clear
            php artisan config:cache && php artisan route:cache && php artisan view:cache
            php -r "function rc($s,$d){if(!is_dir($d))mkdir($d,0755,true);foreach(scandir($s)as $f){if($f==='.'||$f==='..') continue;$sp=$s.'/'.$f;$dp=$d.'/'.$f;is_dir($sp)?rc($sp,$dp):copy($sp,$dp);}}rc('storage/app/public','public/storage');echo 'Storage OK';"
            echo "Deploy concluido!"
