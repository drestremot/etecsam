name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 180s
          script_stop: false
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam

            # ╔══════════════════════════════════════════════════════════╗
            # ║           BACKUP AUTOMATICO DO BANCO DE DADOS           ║
            # ║  Executado ANTES de qualquer alteracao no servidor      ║
            # ╚══════════════════════════════════════════════════════════╝

            # Diretorio de backups FORA do repositorio git
            BACKUP_DIR=~/db_backups
            mkdir -p "$BACKUP_DIR"

            # Nome do backup com data e hora
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            BACKUP_FILE="$BACKUP_DIR/database_$TIMESTAMP.sqlite"
            LATEST_FILE="$BACKUP_DIR/latest.sqlite"

            # Fazer backup se o banco existir e nao estiver vazio
            if [ -f database/database.sqlite ] && [ -s database/database.sqlite ]; then
              cp database/database.sqlite "$BACKUP_FILE"
              # Atualizar link "latest" para o backup mais recente
              cp database/database.sqlite "$LATEST_FILE"
              DB_SIZE=$(stat -c%s database/database.sqlite)
              echo "✓ BACKUP CRIADO: $BACKUP_FILE ($DB_SIZE bytes)"
              echo "✓ BACKUP LATEST: $LATEST_FILE"
            else
              echo "⚠ Banco nao encontrado ou vazio - sem backup desta vez"
            fi

            # Manter apenas os ultimos 7 backups (evitar lotacao do disco)
            BACKUP_COUNT=$(ls "$BACKUP_DIR"/database_*.sqlite 2>/dev/null | wc -l)
            if [ "$BACKUP_COUNT" -gt 7 ]; then
              ls -t "$BACKUP_DIR"/database_*.sqlite | tail -n +8 | xargs rm -f
              echo "✓ Backups antigos removidos (mantendo os 7 mais recentes)"
            fi
            echo "Backups disponiveis: $(ls -t $BACKUP_DIR/database_*.sqlite 2>/dev/null | head -5 | xargs -I{} basename {})"

            # ╔══════════════════════════════════════════════════════════╗
            # ║              ATUALIZAR CODIGO DO SERVIDOR               ║
            # ╚══════════════════════════════════════════════════════════╝

            # git reset --hard remove o database.sqlite do working dir
            # (ele foi removido do git tracking mas ainda pode estar no indice local)
            # Por isso o backup foi feito ANTES e o restore sera feito DEPOIS
            git fetch origin main
            git reset --hard origin/main

            # ╔══════════════════════════════════════════════════════════╗
            # ║           RESTAURAR BANCO APOS ATUALIZACAO             ║
            # ╚══════════════════════════════════════════════════════════╝

            if [ -f "$LATEST_FILE" ] && [ -s "$LATEST_FILE" ]; then
              cp "$LATEST_FILE" database/database.sqlite
              chmod 664 database/database.sqlite
              DB_SIZE=$(stat -c%s database/database.sqlite)
              echo "✓ BANCO RESTAURADO DO BACKUP ($DB_SIZE bytes)"
            else
              # Primeira instalacao: criar banco vazio
              touch database/database.sqlite
              chmod 664 database/database.sqlite
              echo "✓ Primeira instalacao: banco vazio criado"
            fi

            # ╔══════════════════════════════════════════════════════════╗
            # ║              INSTALAR/ATUALIZAR DEPENDENCIAS            ║
            # ╚══════════════════════════════════════════════════════════╝

            composer install --no-dev --optimize-autoloader --no-interaction --quiet

            # ╔══════════════════════════════════════════════════════════╗
            # ║                  BANCO DE DADOS                        ║
            # ╚══════════════════════════════════════════════════════════╝

            # Rodar apenas migrations NOVAS (nunca apaga dados existentes)
            php artisan migrate --force
            echo "✓ Migrations executadas"

            # Garantir usuario admin (updateOrInsert = seguro, nao apaga dados)
            php artisan db:seed --class=AdminSeeder --force
            echo "✓ Admin garantido"

            # ╔══════════════════════════════════════════════════════════╗
            # ║                    STORAGE / IMAGENS                   ║
            # ╚══════════════════════════════════════════════════════════╝

            mkdir -p storage/framework/views
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/cache/data
            mkdir -p storage/logs
            chmod -R 775 storage/
            chmod 775 bootstrap/cache/
            chmod 664 database/database.sqlite 2>/dev/null || true

            # Recriar symlink do storage de imagens
            rm -f public/storage
            ln -s ~/domains/etecsam.com.br/public_html/etecsam/storage/app/public public/storage
            echo "✓ Storage symlink: $(readlink -f public/storage)"

            # ╔══════════════════════════════════════════════════════════╗
            # ║                  LIMPAR CACHES                         ║
            # ╚══════════════════════════════════════════════════════════╝

            php artisan config:clear && php artisan route:clear && php artisan view:clear
            php artisan config:cache && php artisan route:cache
            echo "✓ Caches atualizados"

            # ╔══════════════════════════════════════════════════════════╗
            # ║                   DIAGNOSTICO FINAL                    ║
            # ╚══════════════════════════════════════════════════════════╝

            echo ""
            echo "=== RESUMO DO DEPLOY ==="
            echo "Banco atual: $(stat -c%s database/database.sqlite 2>/dev/null || echo 0) bytes"
            echo "Backups disponiveis:"
            ls -lh "$BACKUP_DIR"/database_*.sqlite 2>/dev/null | awk '{print "  " $5 "  " $9}' || echo "  Nenhum"
            echo "Para restaurar um backup especifico:"
            echo "  cp ~/db_backups/database_YYYYMMDD_HHMMSS.sqlite ~/domains/etecsam.com.br/public_html/etecsam/database/database.sqlite"
            echo ""
            grep -a "\.ERROR\|\.CRITICAL\|\.EMERGENCY" storage/logs/laravel.log 2>/dev/null | tail -3 || echo "(sem erros criticos no log)"
            echo "=== Deploy concluido ==="
