name: Deploy - Etec SAM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/build/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '65002' }}
          timeout: 120s
          script: |
            cd ~/domains/etecsam.com.br/public_html/etecsam

            # === PROTECAO DO BANCO DE DADOS ===
            # 1. Remover banco do rastreamento Git (sem apagar o arquivo)
            git rm --cached database/database.sqlite 2>/dev/null || true
            git rm --cached database/database.sqlite-wal 2>/dev/null || true
            git rm --cached database/database.sqlite-shm 2>/dev/null || true

            # 2. Backup do banco antes de qualquer operacao
            if [ -f database/database.sqlite ]; then
              cp database/database.sqlite database/database.sqlite.bak
              echo "Backup do banco criado: database.sqlite.bak"
            fi

            # 3. Atualizar o codigo (sem sobrescrever o banco)
            git fetch origin main
            git checkout -- .  # restaurar arquivos modificados localmente (exceto banco)
            git pull origin main

            # 4. Restaurar banco se foi sobrescrito pelo pull
            if [ -f database/database.sqlite.bak ]; then
              # Comparar tamanhos: se o banco ficou menor apos pull, restaurar backup
              BACKUP_SIZE=$(stat -c%s database/database.sqlite.bak)
              CURRENT_SIZE=$(stat -c%s database/database.sqlite 2>/dev/null || echo "0")
              if [ "$CURRENT_SIZE" -lt "$BACKUP_SIZE" ]; then
                cp database/database.sqlite.bak database/database.sqlite
                echo "Banco restaurado do backup (pull havia sobrescrito)"
              fi
            fi
            # === FIM PROTECAO ===

            # Instalar dependencias PHP
            composer install --no-dev --optimize-autoloader --no-interaction

            # Rodar apenas migrations pendentes (nao apaga dados existentes)
            php artisan migrate --force

            # Garantir usuario admin (updateOrInsert - nao apaga outros dados)
            php artisan db:seed --class=AdminSeeder --force

            # Limpar e recriar caches
            php artisan config:clear && php artisan route:clear && php artisan view:clear
            php artisan config:cache && php artisan route:cache

            # Criar symlink do storage se necessario
            php -r "function rc($s,$d){if(!is_dir($d))mkdir($d,0755,true);foreach(scandir($s)as $f){if($f==='.'|||$f==='..') continue;$sp=$s.'/'.'$f;$dp=$d.'/'.'$f;is_dir($sp)?rc($sp,$dp):copy($sp,$dp);}}rc('storage/app/public','public/storage');echo 'Storage OK';"

            echo "Deploy concluido com sucesso!"
